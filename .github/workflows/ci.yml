name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:coverage -- --run

      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Check for required secrets
        run: |
          if [ -z "$TEST_EMAIL" ] || [ -z "$NEXT_PUBLIC_FIREBASE_API_KEY" ]; then
            echo "E2E secrets not configured — skipping"
            echo "SKIP_E2E=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_E2E != 'true'

      - uses: actions/setup-node@v4
        if: env.SKIP_E2E != 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: env.SKIP_E2E != 'true'

      - run: npx playwright install chromium
        if: env.SKIP_E2E != 'true'

      - run: npx playwright test
        if: env.SKIP_E2E != 'true'

      - uses: actions/upload-artifact@v4
        if: failure() && env.SKIP_E2E != 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
